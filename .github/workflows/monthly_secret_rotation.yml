name: Monthly Secrets Rotation

on:
  schedule:
    - cron: '0 2 1 * *'
  workflow_dispatch:

jobs:
  rotate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Rotate secrets (encrypted artifact)
        env:
          RIA_SECRETS_ENCRYPTION_KEY: ${{ secrets.RIA_SECRETS_ENCRYPTION_KEY }}
        run: python scripts/rotate_secrets.py
      - name: Upload encrypted secrets artifact
        uses: actions/upload-artifact@v4
        with:
          name: rotated-secrets-encrypted
          path: deploy/k8s/secrets.rotated.enc
