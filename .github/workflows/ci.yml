name: CI

on:
  push:
  pull_request:

jobs:
  test-and-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Unit tests
        run: python -m unittest discover -s tests -p "test_*.py" -v
      - name: Generate eval dataset
        run: python -m app.eval.generate_eval_dataset
      - name: QA eval dataset
        run: python -m app.eval.qa_eval_dataset
      - name: Run benchmark
        run: python -m app.eval.benchmark
      - name: Enforce benchmark gate
        run: python -m app.eval.gate_thresholds
      - name: Compliance check
        run: python scripts_compliance_check.py
